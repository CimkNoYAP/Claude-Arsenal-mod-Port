plugins {
	id 'fabric-loom' version '1.9-SNAPSHOT'
	id "io.github.ladysnake.chenille" version "0.14.0"
}

version = project.mod_version
group = project.maven_group

base {
	archivesName = project.archives_base_name
}

chenille {
	configurePublishing {
		withLadysnakeMaven()
		withGithubRelease()
		withModrinthRelease()
	}
}

repositories {
	// Modrinth
	maven { url "https://api.modrinth.com/maven" }

	// Mod Menu, EMI
	maven { url "https://maven.terraformersmc.com/releases/" }

	// CCA
	maven {
		name = 'Ladysnake Mods'
		url = 'https://maven.ladysnake.org/releases'
	}

	// Reach entity attributes
	maven {
		name "reach entity attributes"
		url "https://maven.jamieswhiteshirt.com/libs-release"
	}

	// DataSync (required by Ratatouille)
	maven {
		name "uuid.gg"
		url "https://maven.uuid.gg/releases"
	}
}

loom {
	accessWidenerPath = file("src/main/resources/arsenal.accesswidener")
}

fabricApi {
	configureDataGeneration {
		modId = "arsenal"
	}
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

	// Libraries
	modIncludeImplementation "org.ladysnake.cardinal-components-api:cardinal-components-base:${project.cca_version}"
	modIncludeImplementation "org.ladysnake.cardinal-components-api:cardinal-components-entity:${project.cca_version}"
	modIncludeImplementation "org.ladysnake.cardinal-components-api:cardinal-components-item:${project.cca_version}"
	modIncludeImplementation "com.jamieswhiteshirt:reach-entity-attributes:${reach_entity_attributes_version}"
	modImplementation "dev.doctor4t:ratatouille:${project.ratatouille_version}"

	// Runtime mods
	modLocalImplementation "com.terraformersmc:modmenu:${mod_menu_version}"
	modLocalImplementation "dev.emi:trinkets:${trinkets_version}"
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.base.archivesName.get()}"}
	}
}
